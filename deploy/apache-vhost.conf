# Apache reverse proxy -> Gunicorn (Murimi OS API) on a Contabo server.
#
# Enable the required modules first:
#   sudo a2enmod proxy proxy_http headers ssl rewrite
#   sudo a2ensite murimi-api && sudo systemctl reload apache2
#
# For HTTPS, use certbot:  sudo certbot --apache -d api.yourdomain.com

<VirtualHost *:80>
    ServerName api.yourdomain.com

    # Redirect all HTTP to HTTPS (uncomment once TLS is set up)
    # RewriteEngine On
    # RewriteCond %{HTTPS} off
    # RewriteRule ^ https://%{HTTP_HOST}%{REQUEST_URI} [R=301,L]

    ProxyPreserveHost On
    ProxyPass        /  http://127.0.0.1:8000/
    ProxyPassReverse /  http://127.0.0.1:8000/

    RequestHeader set X-Forwarded-Proto "http"

    ErrorLog  ${APACHE_LOG_DIR}/murimi_error.log
    CustomLog ${APACHE_LOG_DIR}/murimi_access.log combined
</VirtualHost>

