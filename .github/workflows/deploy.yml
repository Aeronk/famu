name: Deploy (Contabo / Apache)

# Deploys via SSH (no Docker). Configure these GitHub repo secrets:
#   CONTABO_HOST, CONTABO_USER, CONTABO_SSH_KEY, CONTABO_APP_DIR
on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.CONTABO_HOST }}
          username: ${{ secrets.CONTABO_USER }}
          key: ${{ secrets.CONTABO_SSH_KEY }}
          script: |
            set -e
            cd ${{ secrets.CONTABO_APP_DIR }}
            git pull --ff-only
            ./.venv/bin/pip install -r requirements.txt
            ./.venv/bin/alembic upgrade head
            sudo systemctl restart murimi-api
            sudo systemctl restart murimi-worker
            sudo systemctl restart murimi-beat
            echo "Deployed $(git rev-parse --short HEAD)"
